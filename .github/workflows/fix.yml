name: Fix Errors

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: errors-fix

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config --global user.name "Errors Bot"
          git config --global user.email "errors-bot@noreply.github.com"

      - name: Fix errors with claude
        run: go run ./cmd/errors fix
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DUUNITORI_REPO: ${{ secrets.DUUNITORI_REPO }}
          DUUNITORI_BASE_BRANCH: ${{ secrets.DUUNITORI_BASE_BRANCH }}
          # GitHub reserves the secret name GITHUB_TOKEN, so the PAT with push
          # access to the duunitori repo is stored as DUUNITORI_PUSH_TOKEN and
          # mapped to the GITHUB_TOKEN env var the Go code reads.
          GITHUB_TOKEN: ${{ secrets.DUUNITORI_PUSH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
